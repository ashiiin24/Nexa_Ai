{% load static socialaccount %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Nexa</title>
  <link rel="stylesheet" href="{% static 'llmhub/styles.css' %}">
</head>
<body class="auth-body">
  <main class="auth-card">
    <img class="auth-logo" src="{% static 'llmhub/nexa-logo.png' %}" alt="Nexa">
    <h1>Welcome back</h1>
    <p>Login to continue to Nexa</p>

    {% if google_oauth_ready %}
      <a class="google-btn" href="{% provider_login_url 'google' %}">
        <span class="google-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path fill="#4285F4" d="M21.6 12.2c0-.8-.1-1.5-.2-2.2H12v4.2h5.4c-.2 1.3-.9 2.3-2 3v2.5h3.2c1.9-1.7 3-4.3 3-7.5z"/>
            <path fill="#34A853" d="M12 22c2.7 0 5-.9 6.6-2.4l-3.2-2.5c-.9.6-2 .9-3.4.9-2.6 0-4.8-1.7-5.6-4.1H3.1v2.6C4.7 19.8 8.1 22 12 22z"/>
            <path fill="#FBBC05" d="M6.4 13.9c-.2-.6-.3-1.2-.3-1.9s.1-1.3.3-1.9V7.5H3.1C2.4 8.9 2 10.4 2 12s.4 3.1 1.1 4.5l3.3-2.6z"/>
            <path fill="#EA4335" d="M12 6c1.5 0 2.8.5 3.8 1.5l2.9-2.9C17 3 14.7 2 12 2 8.1 2 4.7 4.2 3.1 7.5l3.3 2.6C7.2 7.7 9.4 6 12 6z"/>
          </svg>
        </span>
        Continue with Google
      </a>
    {% else %}
      <button class="google-btn disabled" type="button" disabled>
        <span class="google-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path fill="#4285F4" d="M21.6 12.2c0-.8-.1-1.5-.2-2.2H12v4.2h5.4c-.2 1.3-.9 2.3-2 3v2.5h3.2c1.9-1.7 3-4.3 3-7.5z"/>
            <path fill="#34A853" d="M12 22c2.7 0 5-.9 6.6-2.4l-3.2-2.5c-.9.6-2 .9-3.4.9-2.6 0-4.8-1.7-5.6-4.1H3.1v2.6C4.7 19.8 8.1 22 12 22z"/>
            <path fill="#FBBC05" d="M6.4 13.9c-.2-.6-.3-1.2-.3-1.9s.1-1.3.3-1.9V7.5H3.1C2.4 8.9 2 10.4 2 12s.4 3.1 1.1 4.5l3.3-2.6z"/>
            <path fill="#EA4335" d="M12 6c1.5 0 2.8.5 3.8 1.5l2.9-2.9C17 3 14.7 2 12 2 8.1 2 4.7 4.2 3.1 7.5l3.3 2.6C7.2 7.7 9.4 6 12 6z"/>
          </svg>
        </span>
        Add Google OAuth keys in .env
      </button>
    {% endif %}

    <div class="divider"><span>or</span></div>

    <form method="post" class="auth-form">
      {% csrf_token %}
      {{ form.non_field_errors }}
      <label>Username {{ form.username }}</label>
      <label>Password {{ form.password }}</label>
      <button type="submit">Login</button>
    </form>

    <p class="auth-link">New here? <a href="{% url 'signup' %}">Create account</a></p>
  </main>
</body>
</html>
